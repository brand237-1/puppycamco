<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Puppy Cam Co</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (window.tailwind) {
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            white: '#FFFFFF',
                            slate: '#708090',
                            black: '#000000',
                            brown: '#8B4513',
                            forest: '#2E8B57',
                            blue: '#4682B4',
                            beige: '#F1EDE6'
                        },
                        fontFamily: {
                            sans: ['Outfit', 'sans-serif'],
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4 font-sans text-black">

    <div
        class="bg-white p-8 md:p-12 rounded-3xl shadow-2xl max-w-md w-full border border-gray-100 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-3 bg-forest"></div>

        <div class="text-center mb-8">
            <a href="index.html" class="inline-block"><img src="favicon.png" alt="Logo"
                    class="w-20 h-20 mx-auto rounded-full shadow-md mb-4 bg-gray-100 object-cover"></a>
            <h1 class="text-3xl font-bold text-forest">VIP Access</h1>
            <p class="text-gray-500 text-sm mt-2">Admin Dashboard Login</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div id="error-msg"
                class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-sm text-center border border-red-100"></div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email <i
                        class="fa-solid fa-envelope ml-1 text-gray-400"></i></label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-forest focus:border-forest transition outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password <i
                        class="fa-solid fa-lock ml-1 text-gray-400"></i></label>
                <input type="password" id="password" required
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-forest focus:border-forest transition outline-none">
            </div>

            <button type="submit" id="login-btn"
                class="w-full bg-black text-white font-bold py-4 rounded-xl shadow-lg hover:bg-black transition duration-300 mt-4 flex justify-center items-center">
                <span>Access Dashboard</span>
            </button>
        </form>
    </div>

    <script src="js/admin-login.js"></script>
</body>

</html>
